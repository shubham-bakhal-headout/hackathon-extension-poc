<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Headout Autofill</title>
  </head>
  <body>
    <div class="card">
      <h1>Headout Autofill</h1>

      <label class="field">
        <span class="field-label">Environment</span>
        <select id="env"></select>
      </label>

      <div id="status" class="status status--unknown">Checking session…</div>

      <button id="login" class="btn" hidden>Log in to Headout</button>

      <p class="hint">
        Open a Zendesk ticket and use the <strong>Autofill vendor form</strong>
        button next to the Task number.
      </p>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
